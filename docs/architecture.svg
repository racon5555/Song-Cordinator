<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<title>Architektur song-worker</title>
<desc>Coordinator sendet Webhook an Receiver-Lambda (Function URL), diese schreibt runId nach DynamoDB, reiht in SQS ein und antwortet 202. Worker-Lambda konsumiert die Queue, ruft iTunes, Lyrics-APIs und OpenAI auf, laedt das Comic nach S3 und meldet das Ergebnis per POST an den Coordinator.</desc>
